<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideNow</title>

  <style>
    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    header {
      background:#00AA13;
      color:white;
      padding:15px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1 { margin:0; }

    nav a {
      color:white;
      margin-left:15px;
      text-decoration:none;
      font-weight:bold;
    }

    .hero {
      background:linear-gradient(135deg,#00AA13,#4CAF50);
      color:white;
      padding:60px 20px;
      text-align:center;
    }

    .hero h2 {
      font-size:36px;
      margin-bottom:10px;
    }

    .hero p {
      font-size:18px;
      margin-bottom:20px;
    }

    .hero button {
      padding:12px 25px;
      border:none;
      border-radius:8px;
      background:white;
      color:#00AA13;
      font-weight:bold;
      cursor:pointer;
    }

    .features {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      padding:30px;
    }

    .card {
      background:white;
      margin:10px;
      padding:20px;
      border-radius:12px;
      width:220px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .order {
      background:white;
      padding:20px;
      margin:30px auto;
      max-width:400px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    input, select {
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button {
      width:100%;
      padding:12px;
      background:#00AA13;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .result {
      margin-top:10px;
      font-weight:bold;
      text-align:center;
    }

    footer {
      background:#00AA13;
      color:white;
      text-align:center;
      padding:15px;
    }
  </style>
</head>
<body>

<header>
  <h1>RideNow</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#features">Fitur</a>
    <a href="#order">Pesan</a>
  </nav>
</header>

<section class="hero">
  <h2>Transportasi Online Cepat & Aman</h2>
  <p>Ojek, makanan, dan kirim barang dalam satu aplikasi</p>
  <button onclick="scrollToOrder()">Pesan Sekarang</button>
</section>

<section id="features" class="features">
  <div class="card">
    <h3>🛵 Ojek</h3>
    <p>Antar jemput cepat</p>
  </div>
  <div class="card">
    <h3>🍔 Food</h3>
    <p>Pesan makanan favorit</p>
  </div>
  <div class="card">
    <h3>📦 Delivery</h3>
    <p>Kirim barang aman</p>
  </div>
</section>

<section id="order" class="order">
  <h3>Pesan Sekarang</h3>

  <input type="text" id="pickup" placeholder="Lokasi Jemput">
  <input type="text" id="destination" placeholder="Tujuan">

  <select id="service">
    <option value="10000">Ojek</option>
    <option value="15000">Makanan</option>
    <option value="20000">Barang</option>
  </select>

  <button onclick="pesan()">Pesan</button>

  <div class="result" id="result"></div>
</section>

<footer>
  <p>© 2026 OjekKu - Landing Page</p>
</footer>

<script>
function scrollToOrder() {
  document.getElementById("order").scrollIntoView({ behavior: "smooth" });
}

function pesan() {
  const pickup = document.getElementById("pickup").value;
  const dest = document.getElementById("destination").value;
  const harga = parseInt(document.getElementById("service").value);

  if (!pickup || !dest) {
    alert("Isi lokasi dan tujuan!");
    return;
  }

  document.getElementById("result").innerText =
    "Estimasi harga: Rp " + harga.toLocaleString() + " | Driver siap 🚖";
}
</script>

</body>
</html>
